# 공통 환경변수: backend와 video-worker가 공유하는 DB/MinIO/Video/FFmpeg 설정
x-video-env: &video-env
  POSTGRES_USER: ${POSTGRES_USER:-admin}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-}
  POSTGRES_PASSWORD_FILE: ${POSTGRES_PASSWORD_FILE:-}
  POSTGRES_DB: ${POSTGRES_DB:-devanalysis114}
  POSTGRES_HOST: postgres
  POSTGRES_PORT: 5432
  REDIS_URL: redis://redis:6379/0
  CUDA_MPS_ACTIVE_THREAD_PERCENTAGE: ${CUDA_MPS_ACTIVE_THREAD_PERCENTAGE:-80}
  MINIO_ENDPOINT: minio:9000
  MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-}
  MINIO_ACCESS_KEY_FILE: ${MINIO_ACCESS_KEY_FILE:-/run/codeai-secrets/minio_access_key.txt}
  MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-}
  MINIO_SECRET_KEY_FILE: ${MINIO_SECRET_KEY_FILE:-/run/codeai-secrets/minio_secret_key.txt}
  MINIO_BUCKET: marketplace-projects
  FFMPEG_BIN: ffmpeg
  VIDEO_EXTERNAL_API_URL: ${VIDEO_EXTERNAL_API_URL:-}
  VIDEO_EXTERNAL_API_KEY: ${VIDEO_EXTERNAL_API_KEY:-}
  VIDEO_EXTERNAL_API_KEY_FILE: ${VIDEO_EXTERNAL_API_KEY_FILE:-}
  AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT:-}
  AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY:-}
  AZURE_OPENAI_API_KEY_FILE: ${AZURE_OPENAI_API_KEY_FILE:-}
  AZURE_OPENAI_VIDEO_DEPLOYMENT_NAME: ${AZURE_OPENAI_VIDEO_DEPLOYMENT_NAME:-sora-2}
  AZURE_OPENAI_VISION_DEPLOYMENT_NAME: ${AZURE_OPENAI_VISION_DEPLOYMENT_NAME:-gpt-4o}
  VIDEO_DEDICATED_ENGINE_URL: ${VIDEO_DEDICATED_ENGINE_URL:-}
  VIDEO_DEDICATED_ENGINE_API_KEY: ${VIDEO_DEDICATED_ENGINE_API_KEY:-}
  VIDEO_DEDICATED_ENGINE_API_KEY_FILE: ${VIDEO_DEDICATED_ENGINE_API_KEY_FILE:-}
  VIDEO_DEDICATED_SUBMIT_PATH: ${VIDEO_DEDICATED_SUBMIT_PATH:-/jobs}
  VIDEO_DEDICATED_TIMEOUT_SEC: ${VIDEO_DEDICATED_TIMEOUT_SEC:-900}
  VIDEO_DEDICATED_POLL_SEC: ${VIDEO_DEDICATED_POLL_SEC:-2}
  VIDEO_ALLOW_LOCAL_DEDICATED_ENGINE: ${VIDEO_ALLOW_LOCAL_DEDICATED_ENGINE:-false}
  VIDEO_ENGINE_FALLBACK_TO_INTERNAL: ${VIDEO_ENGINE_FALLBACK_TO_INTERNAL:-false}
  VIDEO_REQUIRE_GENERATIVE_ENGINE: ${VIDEO_REQUIRE_GENERATIVE_ENGINE:-true}
  AD_TOTAL_SECONDS: ${AD_TOTAL_SECONDS:-60}
  AD_CUT_COUNT: ${AD_CUT_COUNT:-6}
  MARKETPLACE_UPLOAD_ROOT: ${MARKETPLACE_UPLOAD_ROOT:-/app/uploads}
  TMPDIR: ${MARKETPLACE_UPLOAD_ROOT:-/app/uploads}/tmp
  MARKETPLACE_RETENTION_DAYS: ${MARKETPLACE_RETENTION_DAYS:-30}
  MARKETPLACE_TEMP_RETENTION_DAYS: ${MARKETPLACE_TEMP_RETENTION_DAYS:-7}

services:
  postgres:
    image: postgres:15-alpine
    container_name: devanalysis114-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-}
      POSTGRES_PASSWORD_FILE: ${POSTGRES_PASSWORD_FILE:-}
      POSTGRES_DB: devanalysis114
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ${HOST_SECRET_ROOT:-./.runtime/secrets}:${CONTAINER_SECRET_ROOT:-/run/codeai-secrets}:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U admin -d devanalysis114" ]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - devanalysis114-network

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    container_name: devanalysis114-minio
    environment:
      MINIO_ROOT_USER_FILE: /run/codeai-secrets/minio_access_key.txt
      MINIO_ROOT_PASSWORD_FILE: /run/codeai-secrets/minio_secret_key.txt
    volumes:
      - minio-data:/data
      - ${HOST_SECRET_ROOT:-./.runtime/secrets}:${CONTAINER_SECRET_ROOT:-/run/codeai-secrets}:ro
    command: server /data --console-address ":9001"
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    networks:
      - devanalysis114-network

  redis:
    image: redis:7-alpine
    container_name: devanalysis114-redis
    command: redis-server --appendonly yes
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "127.0.0.1:6380:6379"
    networks:
      - devanalysis114-network

  qdrant:
    image: qdrant/qdrant:v1.16.2
    container_name: devanalysis114-qdrant
    volumes:
      - qdrant-data:/qdrant/storage
    ports:
      - "127.0.0.1:6333:6333"
    networks:
      - devanalysis114-network

  backend:
    image: devanalysis114-backend
    container_name: devanalysis114-backend
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      <<: *video-env
      SECRET_KEY: ${JWT_SECRET_KEY:-}
      SECRET_KEY_FILE: ${JWT_SECRET_KEY_FILE:-}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-480}
      POSTGRES_POOL_SIZE: ${POSTGRES_POOL_SIZE:-20}
      POSTGRES_MAX_OVERFLOW: ${POSTGRES_MAX_OVERFLOW:-30}
      POSTGRES_POOL_TIMEOUT: ${POSTGRES_POOL_TIMEOUT:-30}
      CORS_ORIGINS: http://localhost:3000,http://localhost:3005,http://127.0.0.1:3000,http://127.0.0.1:3005,https://metanova1004.com,https://xn--114-2p7l635dz3bh5j.com
      QDRANT_URL: http://qdrant:6333
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility,video
      ENABLE_AD_ORDER_WORKER_BOOTSTRAP: ${ENABLE_AD_ORDER_WORKER_BOOTSTRAP:-true}
      ENABLE_SELF_RUN_VIDEO_WORKER_BOOTSTRAP: ${ENABLE_SELF_RUN_VIDEO_WORKER_BOOTSTRAP:-false}
      LLM_MODEL_DEFAULT: ${LLM_MODEL_DEFAULT:-Qwen/Qwen2.5-Coder-32B-Instruct-AWQ}
      LLM_MODEL_REASONING: ${LLM_MODEL_REASONING:-Qwen/Qwen2.5-Coder-32B-Instruct-AWQ}
      LLM_MODEL_CODING: ${LLM_MODEL_CODING:-Qwen/Qwen2.5-Coder-32B-Instruct-AWQ}
      LLM_MODEL_CHAT: ${LLM_MODEL_CHAT:-Qwen/Qwen2.5-Coder-32B-Instruct-AWQ}
      LLM_MODEL_VOICE_CHAT: ${LLM_MODEL_VOICE_CHAT:-Qwen/Qwen2.5-Coder-32B-Instruct-AWQ}
      LLM_MODEL_PLANNER: ${LLM_MODEL_PLANNER:-Qwen/Qwen2.5-Coder-32B-Instruct-AWQ}
      LLM_MODEL_CODER: ${LLM_MODEL_CODER:-Qwen/Qwen2.5-Coder-32B-Instruct-AWQ}
      LLM_MODEL_REVIEWER: ${LLM_MODEL_REVIEWER:-Qwen/Qwen2.5-Coder-32B-Instruct-AWQ}
      LLM_MODEL_DESIGNER: ${LLM_MODEL_DESIGNER:-Qwen/Qwen2.5-Coder-32B-Instruct-AWQ}
      LLM_MODEL_SMART_PLANNER: ${LLM_MODEL_SMART_PLANNER:-Qwen/Qwen2.5-Coder-32B-Instruct-AWQ}
      LLM_MODEL_SMART_EXECUTOR: ${LLM_MODEL_SMART_EXECUTOR:-Qwen/Qwen2.5-Coder-32B-Instruct-AWQ}
      LLM_MODEL_SMART_DESIGNER: ${LLM_MODEL_SMART_DESIGNER:-Qwen/Qwen2.5-Coder-32B-Instruct-AWQ}
      OLLAMA_BASE: ${OLLAMA_BASE:-http://host.docker.internal:8008/v1}
      WEB_SEARCH_ENABLED: ${WEB_SEARCH_ENABLED:-true}
      WEB_SEARCH_PROVIDER: ${WEB_SEARCH_PROVIDER:-auto}
      BING_SEARCH_API_KEY: ${BING_SEARCH_API_KEY:-}
      SERPAPI_API_KEY: ${SERPAPI_API_KEY:-}
      SORISAE_CENTRAL_ENABLED: ${SORISAE_CENTRAL_ENABLED:-true}
      SORISAE_CENTRAL_RATIO: ${SORISAE_CENTRAL_RATIO:-0.5}
      SORISAE_URL: ${SORISAE_URL:-http://sorisae-brain:5050/v1}
      SORISAE_FALLBACK_TIMEOUT_SEC: ${SORISAE_FALLBACK_TIMEOUT_SEC:-2.5}
      ORCH_FORCE_COMPLETE: ${ORCH_FORCE_COMPLETE:-false}
      ORCH_MIN_FILES: ${ORCH_MIN_FILES:-27}
      ORCH_MIN_DIRS: ${ORCH_MIN_DIRS:-3}
      ORCH_MAX_FORCE_RETRIES: ${ORCH_MAX_FORCE_RETRIES:-60}
      ORCH_REQUIRED_FILES: ${ORCH_REQUIRED_FILES:-README.md,requirements.txt,app/main.py,app/routes.py,tests/test_health.py,.gitignore}
      ADMIN_PROBE_BASE_URL: ${ADMIN_PROBE_BASE_URL:-https://nginx}
      ADMIN_PROBE_HOST: ${ADMIN_PROBE_HOST:-metanova1004.com}
      ADMIN_PROBE_VERIFY_SSL: ${ADMIN_PROBE_VERIFY_SSL:-false}
      PASSKEY_RP_ID: ${PASSKEY_RP_ID:-xn--114-2p7l635dz3bh5j.com}
      PASSKEY_EXPECTED_ORIGIN: ${PASSKEY_EXPECTED_ORIGIN:-https://xn--114-2p7l635dz3bh5j.com}
      AD_DOWNLOAD_MIN_NOTICE_MINUTES: ${AD_DOWNLOAD_MIN_NOTICE_MINUTES:-60}
      AD_DOWNLOAD_WINDOW_DAYS: ${AD_DOWNLOAD_WINDOW_DAYS:-30}
      AD_DOWNLOAD_MAX_COUNT: ${AD_DOWNLOAD_MAX_COUNT:-2}
      INTERPRETER_SERVICE_URL: ${INTERPRETER_SERVICE_URL:-http://interpreter-service:8011}
      MUSIC_SERVICE_URL: ${MUSIC_SERVICE_URL:-http://music-service:8012}
      FASTER_WHISPER_MODEL: ${FASTER_WHISPER_MODEL:-small}
      FASTER_WHISPER_DEVICE: ${FASTER_WHISPER_DEVICE:-cuda}
      FASTER_WHISPER_COMPUTE_TYPE: ${FASTER_WHISPER_COMPUTE_TYPE:-float16}
      TURN_URLS: ${TURN_URLS:-}
      TURN_SECRET: ${TURN_SECRET:-}
      TURN_TTL: ${TURN_TTL:-86400}
      STUN_URLS: ${STUN_URLS:-}
      # VoIP 시그널링 스토어/릴레이를 Redis(멀티워커 pub/sub)로 승격(#4). 미설정 시 인메모리(P1) 폴백.
      # 마켓플레이스 캐시(/0)와 분리하기 위해 DB 인덱스 1 사용.
      VOIP_REDIS_URL: ${VOIP_REDIS_URL:-redis://redis:6379/1}
      AUTONOMOUS_SESSION_DIR: /app/data/autonomous_sessions
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      MARKETPLACE_BILLING_ALLOW_SIMULATED_CHECKOUT: ${MARKETPLACE_BILLING_ALLOW_SIMULATED_CHECKOUT:-true}
      MARKETPLACE_STRIPE_WEBHOOK_SIGNING_SECRET: ${MARKETPLACE_STRIPE_WEBHOOK_SIGNING_SECRET:-}
      MARKETPLACE_STRIPE_CHECKOUT_BASE_URL: ${MARKETPLACE_STRIPE_CHECKOUT_BASE_URL:-}
      FCM_PROJECT_ID: ${FCM_PROJECT_ID:-studio-9080238625-9cec3}
      FCM_SERVICE_ACCOUNT_JSON_PATH: ${FCM_SERVICE_ACCOUNT_JSON_PATH:-/run/codeai-secrets/firebase/service-account.json}
    volumes:
      - ./.env:/app/.env
      - ./README.md:/app/README.md:ro
      - ./AGENTS.md:/app/AGENTS.md:ro
      - ./package.json:/app/package.json:ro
      - ./docker-compose.yml:/app/docker-compose.yml:ro
      - ./backend:/app/backend
      - ./docs:/app/docs
      - ./frontend:/app/frontend
      - ./addons:/app/addons
      - ./knowledge:/app/knowledge
      - ./models:/app/models
      - ./reports:/app/reports
      - ${MARKETPLACE_HOST_ROOT:-./uploads}:/app/uploads
      - autonomous-session-data:/app/data/autonomous_sessions
      - ${HOST_SECRET_ROOT:-./.runtime/secrets}:${CONTAINER_SECRET_ROOT:-/run/codeai-secrets}:ro
    ports:
      - "127.0.0.1:8000:8000"
    cpus: ${BACKEND_CPU_LIMIT_CORES:-20.0}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      minio:
        condition: service_started
      interpreter-service:
        condition: service_started
      music-service:
        condition: service_started
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=5)",
        ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    command: >-
      python -m uvicorn backend.main:app --host 0.0.0.0 --port 8000
    networks:
      - devanalysis114-network

  interpreter-service:
    image: devanalysis114-backend
    container_name: devanalysis114-interpreter-service
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./addons:/app/addons
    ports:
      - "127.0.0.1:8011:8011"
    command: >-
      python -m uvicorn addons.shinsegye_interpreter.service_api:app --host
      0.0.0.0 --port 8011
    networks:
      - devanalysis114-network

  sorisae-brain:
    image: codeai-sorisae-local:latest
    build:
      context: ./tmp/external_migrations/run_all_shinsegye.py
      dockerfile: Dockerfile
    container_name: devanalysis114-sorisae-brain
    restart: unless-stopped
    environment:
      PYTHONUNBUFFERED: "1"
      LOG_LEVEL: ${SORISAE_LOG_LEVEL:-INFO}
      TZ: Asia/Seoul
      SORISAE_UPSTREAM_URL: ${SORISAE_UPSTREAM_URL:-http://host.docker.internal:8008}
    ports:
      - "127.0.0.1:15050:5050"
    networks:
      devanalysis114-network:
        aliases:
          - sorisae-brain

  music-service:
    image: devanalysis114-backend
    container_name: devanalysis114-music-service
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./addons:/app/addons
    ports:
      - "127.0.0.1:8012:8012"
    command: >-
      python -m uvicorn addons.shinsegye_music_system.service_api:app --host
      0.0.0.0 --port 8012
    networks:
      - devanalysis114-network

  video-worker:
    image: devanalysis114-backend
    container_name: devanalysis114-video-worker
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      <<: *video-env
      VIDEO_RENDER_QUEUE_NAME: ${VIDEO_RENDER_QUEUE_NAME:-video_render_queue}
    volumes:
      - ./backend:/app/backend
      - ./docs:/app/docs
      - ./knowledge:/app/knowledge
      - ./models:/app/models
      - ${MARKETPLACE_HOST_ROOT:-./uploads}:/app/uploads
      - ./scripts:/app/scripts
      - ${HOST_SECRET_ROOT:-./.runtime/secrets}:${CONTAINER_SECRET_ROOT:-/run/codeai-secrets}:ro
    cpus: ${VIDEO_WORKER_CPU_LIMIT_CORES:-5.6}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    command: python scripts/start_video_render_worker.py
    networks:
      - devanalysis114-network

  # ── 관광 KB 멀티모달 갱신 워커 (API 트래픽 비수신, GPU 불필요) ──
  # ingest + CLIP 백필을 backend(API)에서 분리해 자원 경합/지연 제거. CLIP 은 ONNX/CPU.
  tourism-worker:
    image: devanalysis114-backend
    container_name: devanalysis114-tourism-worker
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      <<: *video-env
      QDRANT_URL: http://qdrant:6333
      TOURISM_CLIP_ENABLED: ${TOURISM_CLIP_ENABLED:-1}
      TOURISM_REFRESH_INTERVAL_HOURS: ${TOURISM_REFRESH_INTERVAL_HOURS:-168}
      TOURISM_REFRESH_RUN_ON_START: ${TOURISM_REFRESH_RUN_ON_START:-false}
      TOURISM_REFRESH_CITIES: ${TOURISM_REFRESH_CITIES:-all}
      TOURISM_REFRESH_LIMIT: ${TOURISM_REFRESH_LIMIT:-700}
      TOURISM_REFRESH_NO_WIKIDATA: ${TOURISM_REFRESH_NO_WIKIDATA:-false}
    volumes:
      - ./backend:/app/backend
      - ./docs:/app/docs
      - ./knowledge:/app/knowledge
      - ./scripts:/app/scripts
      - ${HOST_SECRET_ROOT:-./.runtime/secrets}:${CONTAINER_SECRET_ROOT:-/run/codeai-secrets}:ro
    cpus: ${TOURISM_WORKER_CPU_LIMIT_CORES:-4.0}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    restart: unless-stopped
    command: python scripts/tourism_worker_loop.py
    networks:
      - devanalysis114-network

  frontend-admin:
    image: devanalysis114-frontend-admin
    container_name: devanalysis114-frontend-admin
    build:
      context: ./frontend/frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ""
        NEXT_PUBLIC_SITE_URL: https://xn--114-2p7l635dz3bh5j.com
    environment:
      NODE_ENV: production
      PORT: 3005
      NEXT_PUBLIC_API_URL: ""
      NEXT_PUBLIC_SITE_URL: https://xn--114-2p7l635dz3bh5j.com
      MARKETPLACE_VALIDATOR_BASE_URL: ${MARKETPLACE_VALIDATOR_BASE_URL:-}
      MULTI_PROGRAM_VALIDATOR_BASE_URL: ${MULTI_PROGRAM_VALIDATOR_BASE_URL:-}
      BACKEND_PROXY_TARGET: http://backend:8000
      LOCAL_API_BASE_URL: http://backend:8000
    depends_on:
      backend:
        condition: service_started
    ports:
      - "127.0.0.1:3005:3005"
    networks:
      devanalysis114-network:
        aliases:
          - frontend-admin

  # P0-4: 마켓플레이스 전용 프론트엔드 서비스
  frontend-marketplace:
    image: devanalysis114-frontend-marketplace
    container_name: devanalysis114-frontend-marketplace
    build:
      context: ./frontend/frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ""
        NEXT_PUBLIC_SITE_URL: https://metanova1004.com
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_API_URL: ""
      NEXT_PUBLIC_SITE_URL: https://metanova1004.com
      MARKETPLACE_VALIDATOR_BASE_URL: ${MARKETPLACE_VALIDATOR_BASE_URL:-}
      MULTI_PROGRAM_VALIDATOR_BASE_URL: ${MULTI_PROGRAM_VALIDATOR_BASE_URL:-}
      BACKEND_PROXY_TARGET: http://backend:8000
      LOCAL_API_BASE_URL: http://backend:8000
    depends_on:
      backend:
        condition: service_started
    volumes:
      - ./intraday_lgbm_live:/app/intraday_lgbm_live:ro
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      devanalysis114-network:
        aliases:
          - frontend-marketplace

  nginx:
    image: nginx:1.27-alpine
    container_name: devanalysis114-nginx
    depends_on:
      backend:
        condition: service_healthy
      frontend-admin:
        condition: service_started
    volumes:
      - ./nginx/nginx.conf/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/local-certs:/etc/nginx/local-certs:ro
      - ./certbot/www:/var/www/certbot
    ports:
      - target: 80
        published: ${NGINX_HTTP_PORT:-80}
        protocol: tcp
        host_ip: 0.0.0.0
      - target: 443
        published: ${NGINX_HTTPS_PORT:-443}
        protocol: tcp
        host_ip: 0.0.0.0
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - devanalysis114-network

  # P3-9: Let's Encrypt 자동 SSL 갱신
  certbot:
    image: certbot/certbot:latest
    container_name: devanalysis114-certbot
    volumes:
      - ./certbot/local-certs:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w
      /var/www/certbot --quiet; sleep 12h & wait $${!}; done;'"
    depends_on:
      nginx:
        condition: service_started
    networks:
      - devanalysis114-network

  # ── 소리새 Flask 슬롯 독립 컨테이너 (8개) ───────────────────────────
  # 포트 매핑: 로컬 150xx → 컨테이너 내부 슬롯 기본 포트
  # dispatch 게이트웨이(engine_hub.py)가 SORISAE_FLASK_SERVER_MAP으로 프록시

  sorisae-voice-movie:
    image: devanalysis114-sorisae-flask
    container_name: devanalysis114-sorisae-voice-movie
    build:
      context: .
      dockerfile: Dockerfile.sorisae-flask
    environment:
      SLOT_FILE: slot001_sorisae_voice_movie_server.py
      SLOT_PORT: "5050"
    ports:
      - "127.0.0.1:15001:5050"
    restart: unless-stopped
    networks:
      devanalysis114-network:
        aliases:
          - sorisae-voice-movie

  sorisae-cyber-detective:
    image: devanalysis114-sorisae-flask
    container_name: devanalysis114-sorisae-cyber-detective
    build:
      context: .
      dockerfile: Dockerfile.sorisae-flask
    environment:
      SLOT_FILE: slot041_cyber_detective_dashboard.py
      SLOT_PORT: "5052"
    ports:
      - "127.0.0.1:15041:5052"
    restart: unless-stopped
    networks:
      devanalysis114-network:
        aliases:
          - sorisae-cyber-detective

  sorisae-integrated-dashboard:
    image: devanalysis114-sorisae-flask
    container_name: devanalysis114-sorisae-integrated-dashboard
    build:
      context: .
      dockerfile: Dockerfile.sorisae-flask
    environment:
      SLOT_FILE: slot089_sorisae_integrated_dashboard.py
      SLOT_PORT: "5050"
    ports:
      - "127.0.0.1:15089:5050"
    restart: unless-stopped
    networks:
      devanalysis114-network:
        aliases:
          - sorisae-integrated-dashboard

  sorisae-dashboard-web:
    image: devanalysis114-sorisae-flask
