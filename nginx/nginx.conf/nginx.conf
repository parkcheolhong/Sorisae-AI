worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    client_max_body_size 100m;
    resolver 127.0.0.11 ipv6=off valid=10s;
    proxy_cache_path /var/cache/nginx/marketplace_api levels=1:2 keys_zone=marketplace_api_cache:10m max_size=64m inactive=60s use_temp_path=off;

    sendfile        on;
    keepalive_timeout  65;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_certificate /etc/nginx/local-certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/local-certs/privkey.pem;

    upstream frontend_marketplace {
        zone frontend_marketplace 64k;
        server frontend-marketplace:3000 resolve;
    }

    upstream frontend_admin {
        zone frontend_admin 64k;
        server frontend-admin:3005 resolve;
    }

    upstream backend_upstream {
        zone backend_upstream 64k;
        server backend:8000 resolve;
    }

    map $http_origin $marketplace_cors_origin {
        default "";
        "https://metanova1004.com" $http_origin;
    }

    map $http_referer $next_static_upstream_from_referer {
        default "";
        "~*/admin" frontend_admin;
    }

    map $http_cookie $next_static_upstream_from_cookie {
        default "";
        "~*codeai_frontend_shell=admin" frontend_admin;
        "~*codeai_frontend_shell=marketplace" frontend_marketplace;
    }

    map "$next_static_upstream_from_referer:$next_static_upstream_from_cookie" $next_static_upstream {
        default frontend_marketplace;
        "~*frontend_admin" frontend_admin;
    }

    map $http_referer $next_static_host {
        default $host;
        "~*/admin" $host;
    }

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 80;
        server_name localhost xn--114-2p7l635dz3bh5j.com;

        location /health {
            proxy_pass http://backend_upstream/api/health;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$http_host$request_uri;
        }
    }

