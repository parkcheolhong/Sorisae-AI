name: admin-regression

on:
  pull_request:
    paths:
      - "frontend/frontend/**"
      - "frontend/frontend/proxy.ts"
      - "frontend/frontend/next.config.ts"
      - "backend/main.py"
      - "backend/admin_router.py"
      - "backend/auth.py"
      - "backend/llm/orchestrator.py"
      - "backend/marketplace/router.py"
      - ".github/workflows/admin-regression.yml"
  workflow_dispatch:

jobs:
  admin-regression-precheck:
    runs-on: ubuntu-latest
    outputs:
      run_full: ${{ steps.paths.outputs.admin_full }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Detect full-lane impact paths
        id: paths
        uses: dorny/paths-filter@v3
        with:
          filters: |
            admin_full:
              - 'frontend/frontend/app/admin/**'
              - 'frontend/frontend/components/admin/**'
              - 'frontend/frontend/lib/admin*'
              - 'frontend/frontend/tests/admin*.playwright.spec.ts'
              - 'frontend/frontend/playwright.config.cjs'
              - 'frontend/frontend/package.json'
              - 'frontend/frontend/proxy.ts'
              - 'frontend/frontend/next.config.ts'
              - 'backend/main.py'
              - 'backend/admin_router.py'
              - 'backend/auth.py'
              - 'backend/llm/orchestrator.py'
              - 'backend/marketplace/router.py'

  admin-regression-smoke:
    runs-on: ubuntu-latest
    needs: admin-regression-precheck
    defaults:
      run:
        working-directory: frontend/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run admin regression smoke bundle
        env:
          CI: "1"
          PLAYWRIGHT_USE_WEBSERVER: "1"
          PLAYWRIGHT_ADMIN_PORT: "3005"
          PLAYWRIGHT_ADMIN_BASE_URL: "http://127.0.0.1:3005"
          BACKEND_PROXY_TARGET: "http://127.0.0.1:8000"
        run: npm run ci:admin-regression:smoke

      - name: Upload smoke Playwright report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: admin-regression-smoke-playwright-report
          path: frontend/frontend/playwright-report

  admin-regression-full:
    runs-on: ubuntu-latest
    needs:
      - admin-regression-precheck
      - admin-regression-smoke
    if: ${{ github.event_name == 'workflow_dispatch' || needs.admin-regression-precheck.outputs.run_full == 'true' }}
    defaults:
      run:
        working-directory: frontend/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run admin regression full bundle
        env:
          CI: "1"
          PLAYWRIGHT_USE_WEBSERVER: "1"
          PLAYWRIGHT_ADMIN_PORT: "3005"
          PLAYWRIGHT_ADMIN_BASE_URL: "http://127.0.0.1:3005"
          BACKEND_PROXY_TARGET: "http://127.0.0.1:8000"
        run: npm run ci:admin-regression:full

      - name: Upload full Playwright report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: admin-regression-full-playwright-report
          path: frontend/frontend/playwright-report
