name: "CodeQL Advanced"

on:
    push:
        branches: [ "main" ]
    pull_request:
        branches: [ "main" ]
    schedule:
        - cron: "45 7 * * 0"

jobs:
    analyze:
        name: Analyze (${{ matrix.language }})
        runs-on: ${{ (matrix.language == 'swift' && 'macos-latest') || 'ubuntu-latest'
            }}
        permissions:
            security-events: write
            packages: read
            actions: read
            contents: read

        strategy:
            fail-fast: false
            matrix:
                include:
                    - language: javascript-typescript
                      build-mode: none
                    - language: python
                      build-mode: none

        steps:
            - name: Checkout repository
              uses: actions/checkout@v5

            - name: Setup Python
              if: matrix.language == 'python'
              uses: actions/setup-python@v6
              with:
                  # Use the project's supported/runtime Python version (or lowest supported)
                  # so that CodeQL analysis reflects the actual environment.
                  python-version: '3.11'

            - name: Initialize CodeQL
              uses: github/codeql-action/init@v4
              with:
                  languages: ${{ matrix.language }}
                  build-mode: ${{ matrix.build-mode }}

            - name: Run manual build steps
              if: matrix.build-mode == 'manual'
              shell: bash
              run: |
                  echo 'If you are using a "manual" build mode for one or more languages,'
                  echo 'replace this step with the commands to build your code.'
                  exit 1

            - name: Perform CodeQL Analysis
              uses: github/codeql-action/analyze@v4
              with:
                  category: "/language:${{ matrix.language }}"
