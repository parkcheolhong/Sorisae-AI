# This workflow is a GitHub Copilot coding-agent setup hook.
# It runs before each Copilot agent session and exports COPILOT_AGENT_MODEL
# into $GITHUB_ENV so that the Copilot agent action (actions/ai-inference or
# the built-in coding-agent runner) picks up the model override at startup.
# Without this, the agent would use the organisation/repo default model.
name: "Copilot Setup Steps"

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Force a supported Copilot model
        run: echo "COPILOT_AGENT_MODEL=sweagent-capi:claude-haiku-4.5" >> "$GITHUB_ENV"
