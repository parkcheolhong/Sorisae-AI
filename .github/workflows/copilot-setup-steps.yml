name: "Copilot Setup Steps"

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # When invoked as the GitHub Copilot cloud-agent setup hook, this runs before the main copilot workflow job
      # and sets COPILOT_AGENT_MODEL via $GITHUB_ENV for downstream consumption.
      - name: Force a supported Copilot model
        run: echo "COPILOT_AGENT_MODEL=sweagent-capi:claude-haiku-4.5" >> "$GITHUB_ENV"
