events {
    worker_connections 1024;
}

http {
    upstream llm_backend {
        least_conn;
        server vllm-server:8000 max_fails=3 fail_timeout=30s;
        server tgi-server:80 max_fails=3 fail_timeout=30s;
        server custom-llm-server:8000 max_fails=3 fail_timeout=30s;
    }

    server {
        listen 80;
        server_name localhost;

        # 최대 요청 크기
        client_max_body_size 100M;
        
        # 타임아웃 설정 (LLM 추론은 시간이 걸림)
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        # API 프록시
        location /api/ {
            proxy_pass http://llm_backend/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # 스트리밍 지원
            proxy_buffering off;
            chunked_transfer_encoding on;
        }

        # Web UI
        location / {
            proxy_pass http://web-ui:7860;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        # Grafana
        location /grafana/ {
            proxy_pass http://grafana:3000/;
            proxy_set_header Host $host;
        }

        # Prometheus
        location /prometheus/ {
            proxy_pass http://prometheus:9090/;
            proxy_set_header Host $host;
        }

        # 헬스체크
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
}
